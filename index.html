<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team project with Osimxon</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="container">
      <section class="homepage">
        <header>
          <div class=""></div>
          <div class="header__right">
            <nav>
              <ul class="nav__links">
                <li><a href="/">Product</a></li>
                <li><a href="/">Plans</a></li>
                <li><a href="/">Blog</a></li>
              </ul>
            </nav>
            <button class="header__btn"><a href="/">Get Updates</a></button>
          </div>
        </header>
        <div class="hero">
          <div class="hero__text">
            <div class="first__title">
              <h2>Dekks <small>coming soon</small></h2>
              <h1>Next Generation</h1>
            </div>
            <div class="hero__input">
              <div class="input">
                <input type="text" />
                <button>Notify me✌️</button>
              </div>
              <small
                >Be first on launch and updates. <span>GDPR</span> ready.</small
              >
            </div>
            <div class="hero__bottom">
              <p>
                By continuing to use this site you consent with our cookie
                policy.
              </p>
            </div>
          </div>
        </div>
      </section>
      <section class="shapes">
        <div class="shapes__box">
          <div class="shapes__box--triangle">
            <img src="./images/triangle.png" alt="img" />
          </div>
          <div class="shapes__box--circle">
            <img src="./images/circle.png" alt="img" />
          </div>
        </div>
        <div class="shapes__box2">
          <div class="shapes__box2--circle">
            <img src="./images/circle.png" alt="img" />
          </div>
          <div class="shapes__box2--square">
            <img src="./images/square.png" alt="img">
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
